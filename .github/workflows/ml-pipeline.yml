name: Resource-Efficient CI/CD with Gatekeeper

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linter
        run: |
          echo "Running lightweight linter..."
          echo "No issues found!"

  train:
    needs: linter
    runs-on: ubuntu-latest

    if: >
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]') &&
      needs.linter.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Training Job
        run: |
          echo "Starting expensive GPU training..."
          echo "Training model..."
          exit 0

      - name: Generate Error Logs
        if: failure()
        run: |
          echo "Training failed. Collecting logs..." > error_logs.txt

      - name: Upload Error Logs Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup Resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
