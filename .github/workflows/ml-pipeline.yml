name: Resource-Efficient CI/CD with Gatekeeper

on:
  push:
    branches: [ main, develop ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: echo "lint passed"

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    steps:
      - uses: actions/checkout@v4

      - name: Train
        run: |
          echo "start training"
          exit 1

      - name: Generate logs
        if: failure()
        run: echo "training failed" > error_logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
